<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>G&Z Inventario</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<!-- ZXing for barcode/QR scanning -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/zxing-js/0.21.3/zxing.min.js"></script>
<style>
:root {
  --bg:#f0f4f8; --white:#fff; --border:#e2e8f0;
  --text:#1a202c; --muted:#94a3b8; --dark:#0f172a;
  --accent:#16a34a; --accent-l:#dcfce7; --accent-d:#15803d;
  --warn:#f59e0b; --danger:#ef4444; --blue:#3b82f6;
  --sh:0 2px 12px rgba(0,0,0,.08);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);
  display:flex;flex-direction:column;max-width:480px;margin:0 auto;height:100svh}

/* ── HEADER ── */
.app-header{background:var(--dark);color:#fff;padding:12px 16px 10px;flex-shrink:0}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.brand{display:flex;align-items:center;gap:10px}
.brand-badge{background:var(--accent);width:34px;height:34px;border-radius:9px;
  display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px}
.brand-name{font-weight:700;font-size:16px}
.brand-sub{font-size:9px;color:#64748b;letter-spacing:1.5px;text-transform:uppercase}
.hbtn{background:#1e293b;border:1px solid #334155;color:#fff;padding:7px 13px;
  border-radius:8px;font-family:'Outfit',sans-serif;font-size:12px;font-weight:600;
  cursor:pointer;display:flex;align-items:center;gap:5px;transition:background .15s;
  -webkit-user-select:none;user-select:none}
.hbtn:active{background:#334155}
.stats-strip{display:flex;gap:6px;background:#1e293b;border-radius:10px;padding:8px 10px}
.stat-pill{flex:1;text-align:center}
.stat-pill .sv{font-weight:800;font-size:17px;color:var(--accent);line-height:1}
.stat-pill .sl{font-size:9px;color:#64748b;text-transform:uppercase;letter-spacing:1px;margin-top:2px}
.stat-sep{width:1px;background:#334155}
.progress-bar{height:3px;background:var(--border)}
.progress-fill{height:100%;background:var(--accent);transition:width .4s;border-radius:2px}

/* ── CONTROLS ── */
.controls{background:#fff;padding:10px 14px;border-bottom:1px solid var(--border);flex-shrink:0}
.search-row{display:flex;gap:8px;margin-bottom:8px}
.search-wrap{position:relative;flex:1}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:14px;pointer-events:none}
.search-input{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;
  padding:10px 10px 10px 34px;font-family:'Outfit',sans-serif;font-size:14px;
  color:var(--text);outline:none;transition:border-color .2s}
.search-input:focus{border-color:var(--accent)}
.scan-btn{background:var(--dark);color:#fff;border:none;padding:0 16px;border-radius:10px;
  font-size:20px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;
  transition:background .15s;-webkit-user-select:none;user-select:none;min-width:50px}
.scan-btn:active{background:#334155}
.scan-btn.scanning{background:var(--accent);animation:scanPulse 1.2s infinite}
@keyframes scanPulse{0%,100%{opacity:1}50%{opacity:.7}}
.cat-pills{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none}
.cat-pills::-webkit-scrollbar{display:none}
.cat-pill{flex-shrink:0;padding:6px 11px;border-radius:20px;font-size:11px;font-weight:600;
  border:1.5px solid transparent;cursor:pointer;transition:all .15s;background:var(--bg);
  color:var(--muted);-webkit-user-select:none;user-select:none}
.cat-pill.active{color:#fff}
.cat-pill:active{opacity:.8;transform:scale(.96)}

/* ── SCANNER OVERLAY ── */
.scanner-overlay{display:none;position:fixed;inset:0;background:#000;z-index:300;
  flex-direction:column;align-items:center;justify-content:center}
.scanner-overlay.open{display:flex}
.scanner-top{position:absolute;top:0;left:0;right:0;padding:18px 16px 12px;
  background:linear-gradient(to bottom,rgba(0,0,0,.8),transparent);
  display:flex;align-items:center;justify-content:space-between;z-index:10}
.scanner-title{color:#fff;font-weight:700;font-size:16px}
.scanner-close{background:rgba(255,255,255,.15);border:none;color:#fff;width:36px;height:36px;
  border-radius:50%;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
#scanVideo{width:100%;height:100%;object-fit:cover}
.scan-frame{position:absolute;width:240px;height:240px;z-index:10;pointer-events:none}
.scan-corner{position:absolute;width:28px;height:28px;border-color:#fff;border-style:solid}
.scan-corner.tl{top:0;left:0;border-width:3px 0 0 3px;border-radius:4px 0 0 0}
.scan-corner.tr{top:0;right:0;border-width:3px 3px 0 0;border-radius:0 4px 0 0}
.scan-corner.bl{bottom:0;left:0;border-width:0 0 3px 3px;border-radius:0 0 0 4px}
.scan-corner.br{bottom:0;right:0;border-width:0 3px 3px 0;border-radius:0 0 4px 0}
.scan-line{position:absolute;left:8px;right:8px;height:2px;background:var(--accent);
  animation:scanLine 2s ease-in-out infinite;box-shadow:0 0 8px var(--accent)}
@keyframes scanLine{0%{top:8px}100%{top:calc(100% - 10px)}}
.scan-hint{position:absolute;bottom:0;left:0;right:0;
  background:linear-gradient(to top,rgba(0,0,0,.85),transparent);
  padding:30px 20px 30px;text-align:center;z-index:10}
.scan-hint-text{color:rgba(255,255,255,.7);font-size:13px;margin-bottom:14px}
.scan-manual-btn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);
  color:#fff;padding:10px 22px;border-radius:10px;font-family:'Outfit',sans-serif;
  font-size:14px;font-weight:600;cursor:pointer}

/* ── SCAN SUCCESS FLASH ── */
.scan-success-flash{display:none;position:absolute;inset:0;background:rgba(22,163,74,.25);
  z-index:20;animation:flashAnim .4s forwards}
@keyframes flashAnim{0%{opacity:1}100%{opacity:0;display:none}}

/* ── FOUND PRODUCT SHEET (bottom drawer) ── */
.found-sheet{position:fixed;bottom:0;left:50%;transform:translateX(-50%) translateY(100%);
  width:100%;max-width:480px;background:#fff;border-radius:22px 22px 0 0;
  box-shadow:0 -8px 40px rgba(0,0,0,.2);z-index:400;
  transition:transform .3s cubic-bezier(.34,1.56,.64,1);padding:0 0 32px}
.found-sheet.open{transform:translateX(-50%) translateY(0)}
.sheet-handle{width:40px;height:4px;background:#e2e8f0;border-radius:4px;
  margin:12px auto 16px}
.sheet-content{padding:0 20px}
.sheet-cat-tag{display:inline-flex;align-items:center;gap:6px;
  padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;
  text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}
.sheet-name{font-size:20px;font-weight:800;margin-bottom:4px;line-height:1.2}
.sheet-code{font-size:12px;color:var(--muted);margin-bottom:20px;font-family:monospace}
.sheet-counter{display:flex;align-items:center;justify-content:center;gap:0;margin-bottom:20px}
.sheet-cnt-btn{width:60px;height:60px;border-radius:14px;border:none;font-size:28px;
  font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:transform .08s;-webkit-user-select:none;user-select:none}
.sheet-cnt-btn:active{transform:scale(.88)}
.sheet-cnt-minus{background:#fee2e2;color:#dc2626}
.sheet-cnt-plus{background:var(--accent-l);color:var(--accent)}
.sheet-cnt-val{min-width:80px;text-align:center;font-size:42px;font-weight:800;color:var(--text);cursor:pointer}
.sheet-cnt-val.zero{color:#cbd5e1}
.sheet-cnt-inline{width:80px;text-align:center;font-size:36px;font-weight:800;
  border:2px solid var(--accent);border-radius:10px;color:var(--accent-d);
  font-family:'Outfit',sans-serif;padding:4px 0;outline:none;background:#fff;display:none}
.sheet-confirm{width:100%;padding:16px;background:var(--accent);color:#fff;border:none;
  border-radius:14px;font-family:'Outfit',sans-serif;font-size:16px;font-weight:700;
  cursor:pointer;transition:background .15s;display:flex;align-items:center;
  justify-content:center;gap:8px}
.sheet-confirm:active{background:var(--accent-d)}
.sheet-skip{width:100%;padding:12px;background:transparent;color:var(--muted);border:none;
  font-family:'Outfit',sans-serif;font-size:14px;cursor:pointer;margin-top:6px}

/* NOT FOUND SHEET */
.notfound-sheet{display:flex;flex-direction:column;align-items:center;padding:20px;text-align:center}
.notfound-icon{font-size:48px;margin-bottom:12px}
.notfound-title{font-size:18px;font-weight:700;margin-bottom:6px}
.notfound-sub{font-size:13px;color:var(--muted);margin-bottom:20px}
.notfound-code{background:var(--bg);padding:8px 14px;border-radius:8px;
  font-family:monospace;font-size:13px;color:var(--muted);margin-bottom:20px;word-break:break-all}
.sheet-btn-row{display:flex;gap:8px;width:100%}
.sbtn{flex:1;padding:13px;border-radius:12px;border:none;font-family:'Outfit',sans-serif;
  font-size:14px;font-weight:700;cursor:pointer}
.sbtn-sec{background:var(--bg);color:var(--muted)}
.sbtn-pri{background:var(--dark);color:#fff}

/* ── SCROLL AREA ── */
.scroll-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:10px 12px 90px}
.scroll-area::-webkit-scrollbar{display:none}
.cat-group{margin-bottom:8px}
.cat-header{display:flex;align-items:center;gap:8px;padding:6px 4px 4px;
  cursor:pointer;-webkit-user-select:none;user-select:none}
.cat-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.cat-title{font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);flex:1}
.cat-count{background:var(--bg);border-radius:20px;padding:2px 8px;font-size:11px;font-weight:600;color:var(--muted)}
.cat-count.has-items{background:var(--accent-l);color:var(--accent-d)}
.cat-chevron{color:var(--muted);font-size:12px;transition:transform .2s}
.cat-group.collapsed .cat-chevron{transform:rotate(-90deg)}
.cat-group.collapsed .items-list{display:none}
.items-list{display:flex;flex-direction:column;gap:5px}

/* ITEM CARD */
.item-card{background:#fff;border-radius:10px;padding:9px 12px;display:flex;
  align-items:center;gap:10px;box-shadow:var(--sh);border:1.5px solid transparent;
  transition:border-color .15s,box-shadow .15s;position:relative;overflow:hidden}
.item-card.counted{border-color:var(--accent);background:#f0fdf4}
.item-card.highlighted{border-color:var(--blue);background:#eff6ff;
  box-shadow:0 0 0 3px rgba(59,130,246,.2);animation:highlightPop .4s ease}
@keyframes highlightPop{0%{transform:scale(.98)}60%{transform:scale(1.02)}100%{transform:scale(1)}}
.item-bar{position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--border);border-radius:10px 0 0 10px}
.item-card.counted .item-bar{background:var(--accent)}
.item-card.highlighted .item-bar{background:var(--blue)}
.item-info{flex:1;min-width:0;padding-left:4px}
.item-name{font-weight:600;font-size:13px;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item-meta{font-size:10px;color:var(--muted);margin-top:1px}
.counter{display:flex;align-items:center;gap:0;flex-shrink:0}
.cnt-btn{width:36px;height:36px;border-radius:9px;border:none;font-size:18px;font-weight:700;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:transform .08s;-webkit-user-select:none;user-select:none;touch-action:manipulation}
.cnt-btn:active{transform:scale(.88)}
.cnt-minus{background:#fee2e2;color:#dc2626}
.cnt-plus{background:var(--accent-l);color:var(--accent)}
.cnt-display{min-width:40px;text-align:center;font-size:18px;font-weight:800;
  color:var(--text);padding:0 4px;cursor:pointer}
.cnt-display.zero{color:#cbd5e1}
.cnt-display.has-val{color:var(--accent-d)}
.cnt-wrap-inline{display:none}
.cnt-wrap-inline.active{display:flex}
.cnt-inline{width:48px;background:#fff;border:2px solid var(--accent);border-radius:7px;
  text-align:center;font-family:'Outfit',sans-serif;font-size:16px;font-weight:800;
  color:var(--accent-d);padding:3px 0;outline:none}

/* FAB */
.fab-area{position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:480px;padding:10px 14px 18px;
  background:linear-gradient(to top,#fff 70%,transparent);
  display:flex;gap:8px;pointer-events:none}
.fab-area>*{pointer-events:all}
.fab-export{flex:1;background:var(--accent);color:#fff;border:none;padding:14px;
  border-radius:14px;font-family:'Outfit',sans-serif;font-size:14px;font-weight:700;
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;
  box-shadow:0 4px 20px rgba(22,163,74,.4);transition:all .15s;
  -webkit-user-select:none;user-select:none}
.fab-export:active{transform:scale(.97)}
.fab-reset{background:#fff;border:1.5px solid var(--border);color:var(--muted);
  padding:14px 16px;border-radius:14px;font-family:'Outfit',sans-serif;
  font-size:13px;font-weight:600;cursor:pointer;box-shadow:var(--sh);
  -webkit-user-select:none;user-select:none}

/* TOAST */
.toast{position:fixed;bottom:86px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--dark);color:#fff;padding:10px 20px;border-radius:20px;
  font-size:13px;font-weight:600;opacity:0;transition:all .3s;z-index:999;
  white-space:nowrap;pointer-events:none;max-width:90vw;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* MODALS */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;
  align-items:flex-end;justify-content:center}
.modal-bg.open{display:flex}
.modal-sheet{background:#fff;border-radius:20px 20px 0 0;padding:24px 20px 36px;
  width:100%;max-width:480px}
.modal-sheet h3{font-size:17px;font-weight:700;margin-bottom:6px}
.modal-sheet p{color:var(--muted);font-size:13px;margin-bottom:18px}
.modal-btns{display:flex;gap:8px}
.mbtn{flex:1;padding:13px;border-radius:12px;border:none;font-family:'Outfit',sans-serif;
  font-size:14px;font-weight:700;cursor:pointer}
.mbtn-cancel{background:var(--bg);color:var(--muted)}
.mbtn-danger{background:var(--danger);color:#fff}

/* SHEET BACKDROP */
.sheet-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:350}
.sheet-backdrop.open{display:block}

.empty-state{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-state .ei{font-size:48px;margin-bottom:12px}

@media(min-width:480px){body{box-shadow:0 0 60px rgba(0,0,0,.15)}}
</style>
</head>
<body>

<!-- HEADER -->
<div class="app-header">
  <div class="header-top">
    <div class="brand">
      <div class="brand-badge">G&Z</div>
      <div>
        <div class="brand-name">Inventario</div>
        <div class="brand-sub">G&Z LLC · Almacén</div>
      </div>
    </div>
    <div style="display:flex;gap:6px">
      <button class="hbtn" onclick="openReset()">🗑 Limpiar</button>
    </div>
  </div>
  <div class="stats-strip">
    <div class="stat-pill"><div class="sv" id="stTotal">0</div><div class="sl">Contados</div></div>
    <div class="stat-sep"></div>
    <div class="stat-pill"><div class="sv" id="stUnits">0</div><div class="sl">Unidades</div></div>
    <div class="stat-sep"></div>
    <div class="stat-pill"><div class="sv" id="stProg">0%</div><div class="sl">Avance</div></div>
    <div class="stat-sep"></div>
    <div class="stat-pill"><div class="sv" id="stCats">0</div><div class="sl">Categ.</div></div>
  </div>
</div>
<div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>

<!-- CONTROLS -->
<div class="controls">
  <div class="search-row">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input class="search-input" type="search" id="searchInput"
        placeholder="Buscar producto..." oninput="render()"
        autocomplete="off" autocorrect="off" spellcheck="false">
    </div>
    <button class="scan-btn" id="scanBtn" onclick="toggleScanner()" title="Escanear QR / Código de barras">
      📷
    </button>
  </div>
  <div class="cat-pills" id="catPills"></div>
</div>

<!-- LIST -->
<div class="scroll-area" id="scrollArea"></div>

<!-- FAB -->
<div class="fab-area">
  <button class="fab-reset" onclick="openReset()">↺</button>
  <button class="fab-export" onclick="exportExcel()">📊 Exportar a Excel</button>
</div>

<!-- ── SCANNER OVERLAY ── -->
<div class="scanner-overlay" id="scannerOverlay">
  <div class="scanner-top">
    <div class="scanner-title">📷 Escanear producto</div>
    <button class="scanner-close" onclick="stopScanner()">✕</button>
  </div>
  <video id="scanVideo" autoplay muted playsinline></video>
  <div class="scan-frame">
    <div class="scan-corner tl"></div>
    <div class="scan-corner tr"></div>
    <div class="scan-corner bl"></div>
    <div class="scan-corner br"></div>
    <div class="scan-line"></div>
  </div>
  <div class="scan-hint">
    <div class="scan-hint-text">Apunta al código QR o de barras del producto</div>
    <button class="scan-manual-btn" onclick="manualSearch()">✏️ Buscar manualmente</button>
  </div>
  <div class="scan-success-flash" id="scanFlash"></div>
</div>

<!-- ── FOUND PRODUCT SHEET ── -->
<div class="sheet-backdrop" id="sheetBackdrop" onclick="closeFoundSheet()"></div>
<div class="found-sheet" id="foundSheet">
  <div class="sheet-handle"></div>
  <div class="sheet-content" id="sheetContent"></div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- RESET MODAL -->
<div class="modal-bg" id="resetModal">
  <div class="modal-sheet">
    <h3>⚠️ Limpiar inventario</h3>
    <p>Se borrarán todas las cantidades registradas. Esta acción no se puede deshacer.</p>
    <div class="modal-btns">
      <button class="mbtn mbtn-cancel" onclick="closeReset()">Cancelar</button>
      <button class="mbtn mbtn-danger" onclick="doReset()">Sí, limpiar todo</button>
    </div>
  </div>
</div>

<script>
// ─── DATA ────────────────────────────────────────────────────────────────────
const CATS = [
  {id:'avocados',  name:'Aguacates',          emoji:'🥑', color:'#16a34a'},
  {id:'bananas',   name:'Bananas/Plátanos',    emoji:'🍌', color:'#ca8a04'},
  {id:'mangos',    name:'Mangos',              emoji:'🥭', color:'#ea580c'},
  {id:'fruits',    name:'Frutas',              emoji:'🍓', color:'#db2777'},
  {id:'papaya',    name:'Papaya / Melón',      emoji:'🍈', color:'#f97316'},
  {id:'citrus',    name:'Cítricos',            emoji:'🍋', color:'#eab308'},
  {id:'peppers',   name:'Pimientos / Chiles',  emoji:'🌶', color:'#dc2626'},
  {id:'vegetables',name:'Vegetales',           emoji:'🥬', color:'#059669'},
  {id:'onion',     name:'Cebollas',            emoji:'🧅', color:'#7c3aed'},
  {id:'yam',       name:'Ñame / Papa Dulce',   emoji:'🍠', color:'#92400e'},
  {id:'apples',    name:'Manzanas',            emoji:'🍎', color:'#b91c1c'},
  {id:'roots',     name:'Raíces / Tubérculos', emoji:'🌿', color:'#78350f'},
  {id:'squash',    name:'Calabazas/Chayotes',  emoji:'🫑', color:'#4d7c0f'},
  {id:'herbs',     name:'Hierbas',             emoji:'🌱', color:'#065f46'},
  {id:'garlic',    name:'Ajo / Jengibre',      emoji:'🧄', color:'#a16207'},
  {id:'tomatoes',  name:'Tomates',             emoji:'🍅', color:'#b91c1c'},
  {id:'others',    name:'Otros',               emoji:'📦', color:'#475569'},
];

// Each product has a QR/barcode code = "GYZ-" + id (printed on label)
const PRODUCTS = [
  {id:1,  c:'avocados',   n:"Avocado Villita 48'"},
  {id:2,  c:'avocados',   n:"Avocado Mex 40'"},
  {id:3,  c:'avocados',   n:"Avocado Villita 36'"},
  {id:4,  c:'avocados',   n:"Avocado 22' DR air"},
  {id:5,  c:'bananas',    n:"Banana yellow turning"},
  {id:6,  c:'bananas',    n:"Banana Green DARIAN"},
  {id:7,  c:'bananas',    n:"Banana Green NICO"},
  {id:8,  c:'bananas',    n:"Banana Leaf"},
  {id:9,  c:'bananas',    n:"Banana Manzano"},
  {id:10, c:'bananas',    n:"Banana Flower 40"},
  {id:11, c:'bananas',    n:"Banana thai 33lb"},
  {id:12, c:'bananas',    n:"Yellow Plantain Turbana"},
  {id:13, c:'mangos',     n:"Mango Tommy #1"},
  {id:14, c:'mangos',     n:"Mango Haden #1"},

// Code lookup: "GYZ-{id}" → product, also try name match for generic barcodes
const CODE_MAP = {};
PRODUCTS.forEach(p => { CODE_MAP['GYZ-'+p.id] = p; CODE_MAP['GYZ'+p.id] = p; });

// ─── STATE ───────────────────────────────────────────────────────────────────
let qty = {};
let activeCat = 'all';
let collapsedCats = {};
let scannerRunning = false;
let codeReader = null;
let sheetProductId = null;
let sheetQty = 0;
let scanCooldown = false;

function load() {
  try {
    const q = localStorage.getItem('gyz_qty_v3');
    const cc = localStorage.getItem('gyz_col_v3');
    if (q) qty = JSON.parse(q);
    if (cc) collapsedCats = JSON.parse(cc);
  } catch(e) {}
}
function save() {
  try {
    localStorage.setItem('gyz_qty_v3', JSON.stringify(qty));
    localStorage.setItem('gyz_col_v3', JSON.stringify(collapsedCats));
  } catch(e) {}
}
function getCat(id) { return CATS.find(c=>c.id===id)||{name:id,color:'#888',emoji:'📦'}; }

// ─── SCANNER ─────────────────────────────────────────────────────────────────
async function toggleScanner() {
  if (scannerRunning) { stopScanner(); return; }
  await startScanner();
}

async function startScanner() {
  const overlay = document.getElementById('scannerOverlay');
  const btn = document.getElementById('scanBtn');
  overlay.classList.add('open');
  btn.classList.add('scanning');
  btn.textContent = '⏹';
  scannerRunning = true;

  try {
    // Try ZXing first
    if (typeof ZXing !== 'undefined') {
      const hints = new Map();
      const formats = [
        ZXing.BarcodeFormat.QR_CODE,
        ZXing.BarcodeFormat.CODE_128,
        ZXing.BarcodeFormat.CODE_39,
        ZXing.BarcodeFormat.EAN_13,
        ZXing.BarcodeFormat.EAN_8,
        ZXing.BarcodeFormat.UPC_A,
        ZXing.BarcodeFormat.DATA_MATRIX,
      ];
      hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, formats);
      codeReader = new ZXing.BrowserMultiFormatReader(hints);
      const devices = await ZXing.BrowserCodeReader.listVideoInputDevices();
      // Prefer back camera
      const device = devices.find(d => /back|rear|environment/i.test(d.label)) || devices[devices.length-1] || devices[0];
      const deviceId = device ? device.deviceId : undefined;

      codeReader.decodeFromVideoDevice(deviceId, 'scanVideo', (result, err) => {
        if (!scannerRunning) return;
        if (result) onScanResult(result.getText());
      });
    } else {
      // Fallback: getUserMedia + canvas polling
      await startFallbackScanner();
    }
  } catch(e) {
    console.warn('Scanner error:', e);
    showToast('⚠️ No se pudo acceder a la cámara');
    stopScanner();
  }
}

// Fallback scanner using native BarcodeDetector API (supported in Chrome Android)
let fallbackStream = null;
let fallbackInterval = null;
async function startFallbackScanner() {
  const video = document.getElementById('scanVideo');
  fallbackStream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: 'environment', width:{ideal:1280}, height:{ideal:720} }
  });
  video.srcObject = fallbackStream;
  await video.play();

  if ('BarcodeDetector' in window) {
    const detector = new BarcodeDetector({ formats: ['qr_code','code_128','code_39','ean_13','ean_8','upc_a','data_matrix'] });
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    fallbackInterval = setInterval(async () => {
      if (!scannerRunning || video.readyState < 2) return;
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0);
      try {
        const codes = await detector.detect(canvas);
        if (codes.length > 0) onScanResult(codes[0].rawValue);
      } catch(e) {}
    }, 300);
  }
  // If no BarcodeDetector, camera still shows but no auto-decode
}

function stopScanner() {
  scannerRunning = false;
  const overlay = document.getElementById('scannerOverlay');
  const btn = document.getElementById('scanBtn');
  overlay.classList.remove('open');
  btn.classList.remove('scanning');
  btn.textContent = '📷';

  if (codeReader) { try { codeReader.reset(); } catch(e) {} codeReader = null; }
  if (fallbackInterval) { clearInterval(fallbackInterval); fallbackInterval = null; }
  if (fallbackStream) { fallbackStream.getTracks().forEach(t=>t.stop()); fallbackStream = null; }
  const video = document.getElementById('scanVideo');
  if (video.srcObject) { video.srcObject.getTracks().forEach(t=>t.stop()); video.srcObject = null; }
}

function onScanResult(code) {
  if (scanCooldown || !scannerRunning) return;
  scanCooldown = true;
  setTimeout(() => scanCooldown = false, 1800);

  // Flash feedback
  const flash = document.getElementById('scanFlash');
  flash.style.display = 'block';
  flash.style.animation = 'none';
  setTimeout(() => { flash.style.animation = 'flashAnim .4s forwards'; }, 10);
  setTimeout(() => { flash.style.display = 'none'; }, 500);

  // Vibrate
  if (navigator.vibrate) navigator.vibrate([80, 40, 80]);

  // Look up product
  const product = findProduct(code);
  stopScanner();

  if (product) {
    openFoundSheet(product, code);
  } else {
    openNotFoundSheet(code);
  }
}

function findProduct(code) {
  // Exact code match
  if (CODE_MAP[code]) return CODE_MAP[code];
  if (CODE_MAP[code.toUpperCase()]) return CODE_MAP[code.toUpperCase()];
  // Try to find by name fragment (fuzzy)
  const lower = code.toLowerCase().replace(/[-_]/g,' ');
  return PRODUCTS.find(p => p.n.toLowerCase().includes(lower)) || null;
}

function manualSearch() {
  stopScanner();
  document.getElementById('searchInput').focus();
  document.getElementById('searchInput').scrollIntoView({ behavior:'smooth' });
}

// ─── FOUND SHEET ─────────────────────────────────────────────────────────────
function openFoundSheet(product, code) {
  sheetProductId = product.id;
  sheetQty = qty[product.id] || 0;
  const cat = getCat(product.c);

  document.getElementById('sheetContent').innerHTML = `
    <div class="sheet-cat-tag" style="background:${cat.color}20;color:${cat.color}">
      ${cat.emoji} ${cat.name}
    </div>
    <div class="sheet-name">${product.n}</div>
    <div class="sheet-code">🔖 Código: ${code || 'GYZ-'+product.id}</div>
    <div class="sheet-counter">
      <button class="sheet-cnt-btn sheet-cnt-minus" ontouchstart="sheetBump(-1)" onclick="sheetBump(-1)">−</button>
      <div class="sheet-cnt-val ${sheetQty>0?'':'zero'}" id="sheetDisp" onclick="sheetOpenInline()">${sheetQty||'0'}</div>
      <input class="sheet-cnt-inline" id="sheetInline" type="number" min="0" inputmode="numeric"
        pattern="[0-9]*" style="display:none"
        onblur="sheetCloseInline()"
        onkeydown="if(event.key==='Enter')this.blur()"
        oninput="sheetInlineChange(this.value)">
      <button class="sheet-cnt-btn sheet-cnt-plus" ontouchstart="sheetBump(1)" onclick="sheetBump(1)">+</button>
    </div>
    <button class="sheet-confirm" onclick="confirmFoundSheet()">
      ✅ Guardar cantidad
    </button>
    <button class="sheet-skip" onclick="closeFoundSheet()">Cancelar</button>
  `;

  document.getElementById('sheetBackdrop').classList.add('open');
  document.getElementById('foundSheet').classList.add('open');

  // Also highlight the card in list
  highlightCard(product.id);
}

function openNotFoundSheet(code) {
  sheetProductId = null;
  document.getElementById('sheetContent').innerHTML = `
    <div class="notfound-sheet">
      <div class="notfound-icon">🔎</div>
      <div class="notfound-title">Código no encontrado</div>
      <div class="notfound-sub">Este código no está en el inventario de G&Z</div>
      <div class="notfound-code">${code}</div>
      <div class="sheet-btn-row">
        <button class="sbtn sbtn-sec" onclick="closeFoundSheet()">Cerrar</button>
        <button class="sbtn sbtn-pri" onclick="closeFoundSheet();document.getElementById('searchInput').value='';document.getElementById('searchInput').focus()">
          🔍 Buscar
        </button>
      </div>
    </div>
  `;
  document.getElementById('sheetBackdrop').classList.add('open');
  document.getElementById('foundSheet').classList.add('open');
}

function closeFoundSheet() {
  document.getElementById('sheetBackdrop').classList.remove('open');
  document.getElementById('foundSheet').classList.remove('open');
  sheetProductId = null;
}

function sheetBump(delta) {
  sheetQty = Math.max(0, sheetQty + delta);
  const d = document.getElementById('sheetDisp');
  if (d) { d.textContent = sheetQty; d.className = 'sheet-cnt-val'+(sheetQty>0?'':' zero'); }
}

function sheetOpenInline() {
  const d = document.getElementById('sheetDisp');
  const inp = document.getElementById('sheetInline');
  if (!d||!inp) return;
  d.style.display='none'; inp.style.display='block';
  inp.value = sheetQty||''; inp.focus(); inp.select();
}
function sheetCloseInline() {
  const d = document.getElementById('sheetDisp');
  const inp = document.getElementById('sheetInline');
  if (!d||!inp) return;
  const v = parseInt(inp.value);
  sheetQty = isNaN(v)||v<0 ? sheetQty : v;
  d.style.display=''; inp.style.display='none';
  d.textContent = sheetQty; d.className='sheet-cnt-val'+(sheetQty>0?'':' zero');
}
function sheetInlineChange(val) {
  const v = parseInt(val);
  if (!isNaN(v)&&v>=0) sheetQty = v;
}

function confirmFoundSheet() {
  if (sheetProductId === null) return;
  if (sheetQty > 0) qty[sheetProductId] = sheetQty;
  else delete qty[sheetProductId];
  save();
  closeFoundSheet();
  render();
  updateStats();
  const p = PRODUCTS.find(p=>p.id===sheetProductId);
  showToast(`✅ ${p ? p.n.slice(0,22) : ''} → ${sheetQty} uds`);
  highlightCard(sheetProductId);
}

// ─── HIGHLIGHT ────────────────────────────────────────────────────────────────
function highlightCard(id) {
  setTimeout(() => {
    const card = document.querySelector(`.item-card[data-id="${id}"]`);
    if (card) {
      // Expand category if collapsed
      const group = card.closest('.cat-group');
      if (group && group.classList.contains('collapsed')) {
        const catId = group.dataset.cat;
        collapsedCats[catId] = false;
        save();
        render();
      }
      setTimeout(() => {
        const c2 = document.querySelector(`.item-card[data-id="${id}"]`);
        if (c2) {
          c2.classList.add('highlighted');
          c2.scrollIntoView({ behavior:'smooth', block:'center' });
          setTimeout(() => c2.classList.remove('highlighted'), 2000);
        }
      }, 100);
    }
  }, 80);
}

// ─── RENDER ──────────────────────────────────────────────────────────────────
function buildCatPills() {
  const pills = document.getElementById('catPills');
  pills.innerHTML = '';
  const all = document.createElement('div');
  all.className = 'cat-pill'+(activeCat==='all'?' active':'');
  all.style.background = activeCat==='all'?'#0f172a':'';
  all.style.color = activeCat==='all'?'#fff':'';
  all.textContent = 'Todos';
  all.onclick = () => { activeCat='all'; render(); };
  pills.appendChild(all);
  CATS.forEach(cat => {
    if (!PRODUCTS.some(p=>p.c===cat.id)) return;
    const el = document.createElement('div');
    el.className = 'cat-pill'+(activeCat===cat.id?' active':'');
    el.style.background = activeCat===cat.id ? cat.color : '';
    el.textContent = cat.emoji+' '+cat.name;
    el.onclick = () => { activeCat=cat.id; render(); };
    pills.appendChild(el);
  });
}

function render() {
  buildCatPills();
  const search = document.getElementById('searchInput').value.trim().toLowerCase();
  const area = document.getElementById('scrollArea');
  area.innerHTML = '';
  const catsToShow = activeCat==='all' ? CATS.map(c=>c.id) : [activeCat];
  let totalVisible = 0;

  catsToShow.forEach(catId => {
    let items = PRODUCTS.filter(p=>p.c===catId);
    if (search) items = items.filter(p=>p.n.toLowerCase().includes(search));
    if (!items.length) return;
    const cat = getCat(catId);
    const counted = items.filter(p=>(qty[p.id]||0)>0).length;
    const isCollapsed = collapsedCats[catId] && !search;
    const group = document.createElement('div');
    group.className = 'cat-group'+(isCollapsed?' collapsed':'');
    group.dataset.cat = catId;
    const header = document.createElement('div');
    header.className = 'cat-header';
    header.innerHTML = `
      <div class="cat-dot" style="background:${cat.color}"></div>
      <div class="cat-title">${cat.emoji} ${cat.name}</div>
      <div class="cat-count ${counted>0?'has-items':''}">${counted}/${items.length}</div>
      <div class="cat-chevron">▾</div>`;
    header.onclick = () => { collapsedCats[catId]=!collapsedCats[catId]; save(); render(); };
    group.appendChild(header);
    const list = document.createElement('div');
    list.className = 'items-list';
    items.forEach(p => {
      const q = qty[p.id]||0;
      const card = document.createElement('div');
      card.className = 'item-card'+(q>0?' counted':'');
      card.dataset.id = p.id;
      card.innerHTML = `
        <div class="item-bar"></div>
        <div class="item-info">
          <div class="item-name">${p.n}</div>
          <div class="item-meta">${cat.name} · GYZ-${p.id}</div>

          <button class="cnt-btn cnt-minus" ontouchstart="bump(${p.id},-1)" onclick="bump(${p.id},-1)">−</button>

          <div class="cnt-wrap-inline" id="wrap_${p.id}">
            <input class="cnt-inline" id="inp_${p.id}" type="number" min="0" inputmode="numeric" pattern="[0-9]*"
              onblur="closeInline(${p.id})"
              onkeydown="if(event.key==='Enter')this.blur()"
              oninput="inlineChange(${p.id},this.value)">
          </div>
          <button class="cnt-btn cnt-plus" ontouchstart="bump(${p.id},1)" onclick="bump(${p.id},1)">+</button>
        </div>`;
      list.appendChild(card);
      totalVisible++;
    });
    group.appendChild(list);
    area.appendChild(group);
  });

  if (!totalVisible) {
    area.innerHTML = `<div class="empty-state"><div class="ei">🔍</div><p>No se encontraron productos</p></div>`;
  }
  updateStats();
}

// ─── INLINE EDIT ─────────────────────────────────────────────────────────────
function bump(id, delta) {
  qty[id] = Math.max(0, (qty[id]||0)+delta);
  if (!qty[id]) delete qty[id];
  save();
  const q = qty[id]||0;
  const d = document.getElementById('disp_'+id);
  if (d) { d.textContent=q||'·'; d.className='cnt-display '+(q>0?'has-val':'zero'); }
  const card = document.querySelector(`.item-card[data-id="${id}"]`);
  if (card) {
    q>0?card.classList.add('counted'):card.classList.remove('counted');
    card.style.transform = delta>0?'scale(1.01)':'scale(0.99)';
    setTimeout(()=>card.style.transform='',100);
  }
  updateStats();
}
function openInline(id) {
  const d=document.getElementById('disp_'+id), w=document.getElementById('wrap_'+id), i=document.getElementById('inp_'+id);
  if(!d||!w||!i)return; d.style.display='none'; w.classList.add('active'); i.value=qty[id]||''; i.focus(); i.select();
}
function closeInline(id) {
  const d=document.getElementById('disp_'+id), w=document.getElementById('wrap_'+id), i=document.getElementById('inp_'+id);
  if(!d||!w||!i)return;
  const v=parseInt(i.value); qty[id]=isNaN(v)||v<0?(qty[id]||0):v;
  if(!qty[id])delete qty[id]; save();
  w.classList.remove('active'); d.style.display='';
  const q=qty[id]||0; d.textContent=q||'·'; d.className='cnt-display '+(q>0?'has-val':'zero');
  const card=document.querySelector(`.item-card[data-id="${id}"]`);
  if(card){q>0?card.classList.add('counted'):card.classList.remove('counted');}
  updateStats();
}
function inlineChange(id, val) {
  const v=parseInt(val); if(!isNaN(v)&&v>=0){qty[id]=v;if(!v)delete qty[id];updateStats();save();}
}

// ─── STATS ───────────────────────────────────────────────────────────────────
function updateStats() {
  const counted = Object.keys(qty).filter(k=>qty[k]>0).length;
  const units = Object.values(qty).reduce((a,b)=>a+(b||0),0);
  const pct = Math.round((counted/PRODUCTS.length)*100);
  const activeCatsCount = new Set(Object.keys(qty).filter(k=>qty[k]>0).map(k=>{
    const p=PRODUCTS.find(p=>p.id==k); return p?p.c:null;
  }).filter(Boolean)).size;
  document.getElementById('stTotal').textContent = counted;
  document.getElementById('stUnits').textContent = units;
  document.getElementById('stProg').textContent = pct+'%';
  document.getElementById('stCats').textContent = activeCatsCount;
  document.getElementById('progressFill').style.width = pct+'%';
}

// ─── RESET ───────────────────────────────────────────────────────────────────
function openReset(){document.getElementById('resetModal').classList.add('open')}
function closeReset(){document.getElementById('resetModal').classList.remove('open')}
function doReset(){qty={};save();closeReset();render();showToast('✅ Inventario limpiado')}

// ─── TOAST ───────────────────────────────────────────────────────────────────
function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

// ─── EXPORT EXCEL ────────────────────────────────────────────────────────────
function exportExcel() {
  const counted = Object.keys(qty).filter(k=>qty[k]>0);
  if (!counted.length){showToast('⚠️ No hay cantidades registradas');return;}
  const date = new Date().toLocaleDateString('es-US');
  const time = new Date().toLocaleTimeString('es-US',{hour:'2-digit',minute:'2-digit'});
  const rows=[
    ['G&Z LLC — Inventario del Almacén'],
    [`Fecha: ${date}`,`Hora: ${time}`],
    [],
    ['#','Código','Producto','Categoría','Cantidad'],
  ];
  let i=1;
  CATS.forEach(cat=>{
    const items=PRODUCTS.filter(p=>p.c===cat.id&&(qty[p.id]||0)>0);
    if(!items.length)return;
    items.forEach(p=>{ rows.push([i++,'GYZ-'+p.id,p.n,cat.name,qty[p.id]]); });
  });
  rows.push([],[``,``,`TOTAL UNIDADES`,``,Object.values(qty).reduce((a,b)=>a+(b||0),0)]);
  const csv='\uFEFF'+rows.map(r=>r.map(cell=>{
    const s=String(cell??'');
    return s.includes(',')||s.includes('\n')?`"${s.replace(/"/g,'""')}"`  :s;
  }).join(',')).join('\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download=`GYZ_inventario_${new Date().toISOString().slice(0,10)}.csv`;
  a.click(); URL.revokeObjectURL(url);
  showToast(`✅ Exportado: ${i-1} productos`);
}

// ─── INIT ────────────────────────────────────────────────────────────────────
load(); render();
document.getElementById('resetModal').addEventListener('click', e=>{if(e.target===document.getElementById('resetModal'))closeReset();});
</script>
